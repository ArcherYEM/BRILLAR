<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/common/reset.css">
    <link rel="stylesheet" type="text/css" href="/css/common/style.css">
    <link rel="stylesheet" type="text/css" href="/css/common/common.css">
    <link rel="stylesheet" type="text/css" href="/css/qna.css">
    <title>Q&A</title>
</head>

<body>
<!-- 헤더 -->
<header th:replace="fragments/header :: common-header"></header>

<div class="container qna-container">
    <p class="title-lg">
        Q&A
    </p>
    <div class="qna-wrapper">
        <div class="qna-header">
            <div class="qna-col">번호</div>
            <div class="qna-col col-state">상태</div>
            <div class="qna-col col-title">제목</div>
            <div class="qna-col col-date">등록일</div>
        </div>
        <div id="qna-content" class="content-wrapper">
        </div>
        <div class="pagination qna-pagination">
            <button class="page-btn disabled"><img src="/img/icons/icon-first.svg"/></button>
            <button class="page-btn disabled"><img src="/img/icons/icon-prev.svg"/></button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">4</button>
            <button class="page-btn">5</button>
            <button class="page-btn"><img src="/img/icons/icon-next.svg"/></button>
            <button class="page-btn"><img src="/img/icons/icon-last.svg"/></button>
        </div>
    </div>
</div>

<!-- 푸터 -->
<footer th:replace="fragments/footer :: common-footer"></footer>

<script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<script>
    // 더미데이터
    const qnas = [{
        id: 40,
        state: 0,
        title: "대왕님의 본명이 김머왕이라는게 사실인가요??",
        title: "대왕님의 본명이 김머왕이라는게 사실인가요??",
        date: "2025-05-10",
        secrecy: 1,
    }, {
        id: 39,
        state: 0,
        title: "정처기 실기가 어렵다는게 진짠가요",
        date: "2025-05-10",
        secrecy: 0,
    }, {
        id: 38,
        state: 0,
        title: "정처기 실기가 어렵다는게 진짠가요",
        date: "2025-05-10",
        secrecy: 0,
    }, {
        id: 37,
        state: 1,
        title: "정처기 실기가 어렵다는게 진짠가요",
        date: "2025-05-10",
        secrecy: 0,
    }, {
        id: 36,
        state: 1,
        title: "정처기 실기가 어렵다는게 진짠가요",
        date: "2025-05-10",
        secrecy: 1,
    }, {
        id: 35,
        state: 1,
        title: "정처기 실기가 어렵다는게 진짠가요",
        date: "2025-05-10",
        secrecy: 1,
    }, {
        id: 34,
        state: 1,
        title: "정처기 실기가 어렵다는게 진짠가요",
        date: "2025-05-10",
        secrecy: 1,
    }, {
        id: 33,
        state: 1,
        title: "정처기 실기가 어렵다는게 진짠가요",
        date: "2025-05-10",
        secrecy: 0,
    }, {
        id: 32,
        state: 1,
        title: "정처기 실기가 어렵다는게 진짠가요",
        date: "2025-05-10",
        secrecy: 0,
    }, {
        id: 31,
        state: 1,
        title: "정처기 필기도 어렵다는게 진짠가요",
        date: "2025-05-10",
        secrecy: 0,
    },
    ]

    $(document).ready(function () {
        const $qnaList = $('#qna-content');

        $.each(qnas, function (i, qna) {
            const stateText = qna.state === 0
                ? `<div class="qna-col col-state wating">대기중</div>`
                : `<div class="qna-col col-state confirm">답변 완료</div>`;
            const lockIcon = qna.secrecy === 1
                ? '<img src="/img/icons/icon-lock.svg" alt="비공개" class="lock-icon" style="width: 16px; height: 16px; margin-right: 4px;" />'
                : '';

            const qnaHtml = `
				<div class="qna-list">
					<div class="qna-col">${qna.id}</div>
					${stateText}
					<div class="qna-col col-title">
						<a href="/qna/${qna.id}">
							${qna.title}
						</a>
						${lockIcon}
					</div>
					<div class="qna-col col-date">${qna.date}</div>
				</div>
				`;
            $qnaList.append(qnaHtml);
        });
    });
</script>
</body>

</html>
