<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문현황</title>
    <link rel="stylesheet" type="text/css" href="/css/common/reset.css">
    <link rel="stylesheet" type="text/css" href="/css/common/style.css">
    <link rel="stylesheet" type="text/css" href="/css/common/common.css">
    <link rel="stylesheet" type="text/css" href="/css/mypage.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<!-- 헤더 -->
<header th:replace="fragments/header :: common-header"></header>
<div class="container mypage-container">
    <!-- 사이드바 -->
    <div class="sidebar">
        <div id="UserInfo" class="user-info">
            <p class="user-name">김머왕</p>
            <p class="user-state">
                지금까지 <span class="pur-count">10</span>회 구매하셨어요!
            </p>
        </div>
        <div class="side-menu">
            <ul>
                <li>
                    <div class="icon-wrapper icon-user"></div>
                    내 정보
                </li>
                <li class="active">
                    <div class="icon-wrapper icon-truck"></div>
                    주문현황
                </li>
                <li>
                    <div class="icon-wrapper icon-purchase"></div>
                    주문내역
                </li>
            </ul>
        </div>
        <div class="logout-wrapper">
            <img src="/img/icons/icon-logout.svg" alt="로그아웃"/>
            로그아웃
        </div>
    </div>
    <div class="mypage-content">
        <div class="mypage-info">
            <div class="title-wrap">
                <p class="title-md title-left">
                    주문현황
                </p>
                <p class="sub-text">
                    배송 완료 이전 건만 표시됩니다.
                </p>
            </div>
            <div class="mypage-state">
                <div class="order-header">
                    <div class="order col-num">주문번호</div>
                    <div class="order col-date">주문일자</div>
                    <div class="order col-state">상태</div>
                    <div class="order col-total">결제금액</div>
                </div>
                <div id="StateContainer" class="state-container"></div>
                <div class="pagination state-pagination">
                    <button class="page-btn disabled"><img src="/img/icons/icon-first.svg"/></button>
                    <button class="page-btn disabled"><img src="/img/icons/icon-prev.svg"/></button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <button class="page-btn">4</button>
                    <button class="page-btn">5</button>
                    <button class="page-btn"><img src="/img/icons/icon-next.svg"/></button>
                    <button class="page-btn"><img src="/img/icons/icon-last.svg"/></button>
                </div>
            </div>
        </div>
    </div>
    <!-- 주문 취소 모달-->
    <div th:replace="~{fragments/modal/commonModal :: modalFragment(
        'CanOrdModal', '주문 취소', '',
        '주문 취소 시 즉시 취소 처리됩니다. 결제 수단에 따라 환불 소요 기간은 상이할 수 있으며, 신용카드의 경우 카드사 영업일 기준 최대 7일까지 소요될 수 있습니다.',
        '주문취소', '닫기', 'OrdCancel', 'OrdCloseBtn')}">
    </div>
</div>
<!-- 푸터 -->
<footer th:replace="fragments/footer :: common-footer"></footer>
<script>
    // 더미데이터
    // state 0: 주문확인중, 1: 배송중 으로 잡고 작업함
    const stateList = [{
        orderNum: "78A6431D409",
        date: "2025-01-01",
        state: 0,
        total: "200,000",
        products: [
            {
                name: "멋쟁이 반지",
                image: "/img/products/ring/r1.png",
                price: "120,000",
                quantity: 1,
            }, {
                name: "짱쟁이 반지",
                image: "/img/products/ring/r2.png",
                price: "120,000",
                quantity: 2
            },
            {
                name: "짱쟁이 반지",
                image: "/img/products/ring/r3.png",
                price: "120,000",
                quantity: 1
            }
        ],
        reciveName: "오튜브",
        address1: "서울특별시 강남구 무슨동",
        address2: "뭐시기 사무실 101호"
    }, {
        orderNum: "34VB5540K83",
        date: "2025-01-01",
        state: 0,
        total: "200,000",
        products: [
            {
                name: "멋쟁이 반지",
                image: "/img/products/ring/r1.png",
                price: "120,000",
                quantity: 1,
            },
        ],
        reciveName: "오튜브",
        address1: "서울특별시 강남구 무슨동",
        address2: "뭐시기 사무실 101호"
    }, {
        orderNum: "322VB5540K83",
        date: "2025-01-01",
        state: 1,
        total: "200,000",
        products: [
            {
                name: "멋쟁이 반지",
                image: "/img/products/ring/r1.png",
                price: "120,000",
                quantity: 1,
            }, {
                name: "짱쟁이 반지",
                image: "/img/products/ring/r2.png",
                price: "120,000",
                quantity: 2
            },
        ],
        reciveName: "오튜브",
        address1: "서울특별시 강남구 무슨동",
        address2: "뭐시기 사무실 101호"
    }, {
        orderNum: "43VB5540K83",
        date: "2025-01-01",
        state: 1,
        total: "200,000",
        products: [
            {
                name: "멋쟁이 반지",
                image: "/img/products/ring/r1.png",
                price: "120,000",
                quantity: 1,
            }, {
                name: "짱쟁이 반지",
                image: "/img/products/ring/r2.png",
                price: "120,000",
                quantity: 2
            },
            {
                name: "짱쟁이 반지",
                image: "/img/products/ring/r3.png",
                price: "120,000",
                quantity: 1
            }
        ],
        reciveName: "오튜브",
        address1: "서울특별시 강남구 무슨동",
        address2: "뭐시기 사무실 101호"
    }, {
        orderNum: "64VB5540K83",
        date: "2025-01-01",
        state: 1,
        total: "200,000",
        products: [
            {
                name: "멋쟁이 반지",
                image: "/img/products/ring/r1.png",
                price: "120,000",
                quantity: 1,
            },
        ],
        reciveName: "오튜브",
        address1: "서울특별시 강남구 무슨동",
        address2: "뭐시기 사무실 101호"
    },]

    $(document).ready(function () {
        // 주문현황 리스트
        const $container = $('#StateContainer');
        const stepLabels = ['확인중', '배송중'];

        stateList.forEach((state, index) => {
            const stateHtml = `
					<div id="StateItem" class="order-item">
						<div class="order-summary">
							<div class="order-col col-num">${state.orderNum}</div>
							<div class="order-col col-date">${state.date}</div>
							<div class="order-col col-state">${stepLabels[state.state]}</div>
							<div class="order-col col-total">${state.total}</div>
							<div class="order-col col-thumb">
								${state.products.map(product => `<img src="${product.image}" class="order-photo" alt="상품 이미지">`).join('')}
							</div>
							<img src="/img/icons/icon-arrow.svg" class="order-arrow" data-index="${index}">
						</div>
						<div id="StateDetail" class="order-detail" style="display: none;">
							<div class="order-content">
								<div class="order-product">
									<p class="title-xs title-left">상품 정보</p>
									<div class="product-wrap">
									${state.products.map(product => `
										<div class="product-item">
											<img src=${product.image} alt="상품 이미지" />
											<div class="product-info">
												<p>${product.name}</p>
												<p>₩${product.price}</p>
												<p class="product-quantity">수량: ${product.quantity}</p>
											</div>
										</div>`).join('')}
									</div>
								</div>
								<div class="detail-order">
									<p class="title-xs title-left">배송 정보</p>
									<div class="product-wrap">
										<div class="shipping-info">
											<p class="shipping-title">받는 분 성함</p>
											<p>${state.reciveName}</p>
										</div>
										<div class="shipping-info">
											<p class="shipping-title">주소</p>
											<div class="shipping-address">
												<p>${state.address1}</p>
												<p>${state.address2}</p>
											</div>
										</div>
									</div>
									<div class="shipping-order">
										 ${createShippingSteps(state.state)}
									</div>
									${state.state < 1 ? (`<div class="delete-order">
									<button class="btn-warning open-cancel-modal" data-order="${state.orderNum}">주문취소</button>
									</div>`) : ''}
								</div>
							</div>
						</div>
					</div>
				`;
            $container.append(stateHtml);
        });


        // 리뷰 상세 아코디언
        $container.on('click', '.order-arrow', function () {
            const $arrow = $(this);
            const $detail = $arrow.closest('.order-item').find('.order-detail');

            $detail.stop(true, true).slideToggle(200);
            $arrow.toggleClass('rotated');
        });
    });

    // 주문 취소 모달
    $(document).on('click', '.open-cancel-modal', function () {
        const orderNum = $(this).data('order');
        $('#CanOrdModal').fadeIn(200);
        $('#CanOrdModal .modal-subtitle').text(`주문번호 ${orderNum}에 대한 주문을 취소하시겠습니까?`);
    });

    $('#OrdCloseBtn, .modal-close, #CanOrdModal').on('click', function (e) {
        if ($(e.target).hasClass('modal') || $(e.target).hasClass('modal-close') || $(e.target).hasClass('btn-warning')) {
            $('#CanOrdModal').fadeOut(200);
        }
    });

    // 진행현황 html 그리기
    function createShippingSteps(stateVal) {
        const stepLabels = ['주문확인', '배송중', '배송완료'];
        let html = '';

        for (let i = 0; i < 3; i++) {
            const isCompleted = stateVal > i || stateVal == 2;
            const isNow = stateVal < 2 && stateVal == i;

            html += `
				<div class="step step-${i + 1} ${isNow ? 'step-now' : ''}">
					<div class="step-circle">
						${isCompleted ? `<img src="/img/icons/icon-check.svg" alt="완료">` : i + 1}
					</div>
					${i < 2 ? `<div class="step-line step-line-${i + 1}"></div>` : ''}
					<div class="step-text">
						${stepLabels[i]}
					</div>
				</div>
				`;
        }
        return html;
    }
</script>
</body>
</html>
