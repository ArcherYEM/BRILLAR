<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지</title>
    <link rel="stylesheet" type="text/css" href="/css/common/reset.css">
    <link rel="stylesheet" type="text/css" href="/css/common/style.css">
    <link rel="stylesheet" type="text/css" href="/css/common/common.css">
    <link rel="stylesheet" type="text/css" href="/css/mypage.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<!-- 헤더 -->
<header th:replace="fragments/header :: common-header"></header>
<div class="container mypage-container">
    <!-- 사이드바: 페이지명, 유저이름, 구매횟수 전달 필요 -->
    <div th:replace="~{fragments/mypageSidebar :: sidebarFragment('mypage', '김머왕', 10)}"></div>
    <div class="mypage-content">
        <div id="MyPageInfo" class="mypage-info">
            <!-- 계정정보 출력란 -->
        </div>
        <div class="mypage-review">
            <p class="title-md title-left">
                작성 리뷰
            </p>
            <div id="ReviewContainer" class="review-container"></div>
            <div class="pagination review-pagination">
                <button class="page-btn disabled"><img src="/img/icons/icon-first.svg" /></button>
                <button class="page-btn disabled"><img src="/img/icons/icon-prev.svg" /></button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn">4</button>
                <button class="page-btn">5</button>
                <button class="page-btn"><img src="/img/icons/icon-next.svg" /></button>
                <button class="page-btn"><img src="/img/icons/icon-last.svg" /></button>
            </div>
        </div>
    </div>
    <!-- 비번 변경 모달 -->
    <div th:replace="fragments/modal/changePwdModal"></div>
    <!-- 탈퇴 확인 모달-->
    <div th:replace="~{fragments/modal/commonModal :: modalFragment(
        'DelAcctModal', '회원 탈퇴', '',
        '탈퇴 시에는 회원 정보(계정 정보, 주문 내역, 리뷰)가 삭제되며, 복구가 불가능합니다. 탈퇴 후에는 서비스의 이용이 불가합니다. 정말로 탈퇴하시겠습니까?',
        '탈퇴하기', '취소', 'DelAcct', 'DelAcctClose')}">
    </div>
</div>
<!-- 푸터 -->
<footer th:replace="fragments/footer :: common-footer"></footer>
<script th:src="@{/js/user.js}"></script>
</body>
</html>
