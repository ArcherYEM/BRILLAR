<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트</title>
    <link rel="stylesheet" type="text/css" href="/css/common/reset.css">
    <link rel="stylesheet" type="text/css" href="/css/common/style.css">
    <link rel="stylesheet" type="text/css" href="/css/common/common.css">
    <link rel="stylesheet" type="text/css" href="/css/events.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<!-- 헤더 -->
<header th:replace="fragments/header :: common-header"></header>

<div class="container event-container">
    <p class="title-lg">EVENTS</p>
    <div class="event-wrapper">
        <div id="EventList" class="event-list"></div>
        <div class="pagination event-pagination">
            <button class="page-btn disabled"><img src="/img/icons/icon-first.svg" /></button>
            <button class="page-btn disabled"><img src="/img/icons/icon-prev.svg" /></button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">4</button>
            <button class="page-btn">5</button>
            <button class="page-btn"><img src="/img/icons/icon-next.svg" /></button>
            <button class="page-btn"><img src="/img/icons/icon-last.svg" /></button>
        </div>
    </div>
</div>

<!-- 푸터 -->
<footer th:replace="fragments/footer :: common-footer"></footer>
<script>
    // 더미데이터
    const eventList = [{
        image: "/img/sample/slide-1.png",
        title: "봄맞이 귀걸이 전품목 15% 할인 이벤트",
        desc: "따뜻한 바람이 스치는 봄, 브릴라에서 당신의 귀를 아름답게 물들일 시간입니다. 전 귀걸이 제품을 15% 할인된 가격에 만나보세요. 데일리룩에 포인트가 되어줄 섬세하고 감각적인 디자인으로, 봄날의 설렘을 완성해드립니다.",
        date: "2025.05.01- 2025.06.31",
        state: 0,
    }, {
        image: "/img/sample/slide-2.png",
        title: "봄맞이 귀걸이 전품목 15% 할인 이벤트",
        desc: "클래식한 매력과 고급스러움을 동시에 담은 브릴라 골드 컬렉션을 지금 5% 할인된 가격으로 만나보세요. 특별한 날은 물론, 일상의 작은 순간까지 품격을 더해줄 골드 아이템으로 한층 빛나는 스타일을 연출해보세요.",
        date: "2025.05.01- 2025.06.31",
        state: 0,
    }, {
        image: "/img/sample/slide-3.png",
        title: "봄맞이 귀걸이 전품목 15% 할인 이벤트",
        desc: "둘만의 의미를 담은 특별한 반지, 브릴라에서 커플링을 선택해보세요. 봄을 맞아 브릴라 반지를 10% 할인된 가격에 선보입니다. 같은 디자인에 다른 감성을 담아, 사랑의 모양을 더욱 깊이 있게 표현하세요. 지금, 당신의 사랑을 아름답게 남길 완벽한 순간입니다.",
        date: "2025.05.15- 2025.05.30",
        state: 0,
    }, {
        image: "/img/sample/slide-4.png",
        title: "봄맞이 귀걸이 전품목 15% 할인 이벤트",
        desc: "33월 한정, 브릴라가 엄선한 귀걸이 제품들을 15% 할인된 가격으로 만나보세요. 계절의 전환처럼, 당신의 스타일에도 새로운 변화를 선물할 시간입니다. 우아함과 감각을 동시에 담은 브릴라의 귀걸이로 봄을 시작하세요.",
        date: "2025.03.01- 2025.03.31",
        state: 1,
    }, {
        image: "/img/sample/slide-5.png",
        title: "봄맞이 귀걸이 전품목 15% 할인 이벤트",
        desc: "맑고 깨끗한 분위기를 더해주는 브릴라 실버 컬렉션이 지금 10% 할인 중입니다. 섬세한 광택과 미니멀한 디자인으로 다양한 룩에 자연스럽게 어우러지는 실버 아이템을 가볍게 소장해보세요. 일상 속 작은 특별함을 선사합니다.",
        date: "2025.02.15- 2025.03.15",
        state: 1,
    },]

    $(document).ready(function () {
        // 주문현황 리스트
        const $list = $('#EventList');

        eventList.forEach(event => {
            const isEnded = event.state === 1;

            const item = `
				<div class="event-item ${isEnded ? 'ended' : ''}">
					<img src="${event.image}" alt="${event.title}" class="event-image" />
					<div class="event-meta">
						<p class="event-title">${event.title}</p>
						<p class="event-date">${event.date}</p>
					</div>
					<p class="event-desc">${event.desc}</p>
				</div>
			`;

            $list.append(item);
        });
    });
</script>
</body>
</html>
