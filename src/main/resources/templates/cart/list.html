<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지</title>
    <link rel="stylesheet" type="text/css" href="/css/common/reset.css">
    <link rel="stylesheet" type="text/css" href="/css/common/style.css">
    <link rel="stylesheet" type="text/css" href="/css/common/common.css">
    <link rel="stylesheet" type="text/css" href="/css/cart.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<!-- 헤더 -->
<header th:replace="fragments/header :: common-header"></header>

<div class="container cart-container">
    <div class="cart-wrapper">
        <div class="cart-info">
            <div class="product-info">
                <p class="title-md title-left">
                    장바구니
                </p>
                <!-- 더미데이터 -->
                <div class="product-wrap">
                    <div class="product-item">
                        <img src="/img/products/bracelet/b1.png" alt="제품사진" />
                        <p class="product-name">사실은도금인팔찌</p>
                        <div class="prdouct-quantity">
                            <span class="quantity-dec">-</span>
                            <input type="number" class="quantity" max="99" value="1" />
                            <span class="quantity-inc">+</span>
                        </div>
                        <div class="prodcut-price">
                            <p class="before-sale">₩<span>200,000</span></p>
                            <p>₩<span>180,000</span></p>
                        </div>
                    </div>
                </div>
                <div class="product-wrap">
                    <div class="product-item">
                        <img src="/img/products/bracelet/b1.png" alt="제품사진" />
                        <p class="product-name">사실은도금인팔찌</p>
                        <div class="prdouct-quantity">
                            <span class="quantity-dec">-</span>
                            <input type="number" class="quantity" max="99" value="1" />
                            <span class="quantity-inc">+</span>
                        </div>
                        <div class="prodcut-price">
                            <p>₩<span>50,000</span></p>
                        </div>
                    </div>
                </div>
                <div class="product-wrap">
                    <div class="product-item">
                        <img src="/img/products/bracelet/b1.png" alt="제품사진" />
                        <p class="product-name">사실은도금인팔찌</p>
                        <div class="prdouct-quantity">
                            <span class="quantity-dec">-</span>
                            <input type="number" class="quantity" max="99" value="1" />
                            <span class="quantity-inc">+</span>
                        </div>
                        <div class="prodcut-price">
                            <p>₩<span>50,000</span></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="shipping-info">
                <p class="title-md title-left">
                    배송정보
                </p>
                <div class="shipping-wrap">
                    <div class="shipping-item">
                        <p>받는 분 성함<span class="ship-required">*</span></p>
                        <input id="ReceiverName" type="text" required />
                    </div>
                    <div class="shipping-item">
                        <div class="shipping-top">
                            <p>보내는 분 성함<span class="ship-required">*</span></p>
                            <div class="check-wrap">
                                <input id="InputSameName" type="checkbox" />
                                <p>받는 사람과 동일</p>
                            </div>
                        </div>
                        <input id="SenderName" type="text" required />
                    </div>
                </div>
                <div class="shipping-wrap">
                    <div class="shipping-item">
                        <p>휴대폰 번호<span class="ship-required">*</span></p>
                        <input type="text" required />
                    </div>
                    <div class="shipping-item">
                        <p>이메일 주소</p>
                        <input type="email" />
                    </div>
                </div>
                <div class="address-wrap">
                    <div class="shipping-top">
                        <p>주소<span class="ship-required">*</span></p>
                        <div class="check-wrap">
                            <input type="checkbox" checked />
                            <p>다음에도 이 주소 사용</p>
                        </div>
                    </div>
                    <div class="adderess-group">
                        <input type="text" readonly />
                        <button class="search-postcode btn-secondary" type="button">주소검색</button>
                    </div>
                    <input type="text" placeholder="상세주소를 입력하세요" required />
                </div>
            </div>
        </div>
        <div class="order-info">
            <p class="title-sm order-title">주문 내역</p>
            <div class="order-calc">
                <div class="order-wrap">
                    <p class="info-title title-sum">합계&nbsp;(<span>3</span>개):</p>
                    <p class="info-value">₩200,000</p>
                </div>
                <div class="order-wrap order-discount">
                    <p class="info-title">할인:</p>
                    <p class="info-value">-₩2,000</p>
                </div>
            </div>
            <div class="order-wrap total-wrap">
                <p class="info-title title-total">결제금액:</p>
                <p class="info-value value-total">₩198,000</p>
            </div>
            <button id="PayContinue" class="btn-secondary">결제하기</button>
        </div>
    </div>
    <!-- 결제 확인 모달-->
    <div th:replace="~{fragments/modal/confirmModal :: modalFragment(
        'PayModal', '결제하시겠습니까?',
        '확인 버튼을 누르면 결제가 완료됩니다.',
        '결제하기', '취소', 'PayConfirm', 'PayModalClose')}">
    </div>
</div>

<!-- 푸터 -->
<footer th:replace="fragments/footer :: common-footer"></footer>

<script>
    $(document).ready(function () {
        // 수량 증감
        $('.quantity-inc').on('click', function () {
            const $input = $(this).siblings('.quantity');
            let val = parseInt($input.val(), 10);
            if (val < 99) {
                $input.val(val + 1);
            }
        });
        $('.quantity-dec').on('click', function () {
            const $input = $(this).siblings('.quantity');
            let val = parseInt($input.val(), 10);
            if (val > 1) {
                $input.val(val - 1);
            }
        });

        // 최대 99까지만 입력되도록
        $('.quantity').on('input', function () {
            let val = parseInt($(this).val(), 10);
            if (isNaN(val) || val < 1) {
                $(this).val(1);
            } else if (val > 99) {
                $(this).val(99);
            }
        });

        // 받는 사람과 동일 체크박스
        $('#InputSameName').on('change', function () {
            const isChecked = $(this).is(':checked');
            const $receiverName = $('#ReceiverName');
            const $senderName = $('#SenderName');

            if (isChecked && $receiverName.val().trim() !== '') {
                $senderName.val($receiverName.val().trim());
            }
        });

        // 결제 확인 모달
        $('#PayContinue').on('click', function (e) {
            e.preventDefault();
            $('#PayModal').fadeIn(200);
        });
        $('#PayModalClose, .modal-close, #PayModal').on('click', function (e) {
            if ($(e.target).hasClass('modal') || $(e.target).hasClass('modal-close') || $(e.target).hasClass('btn-warning')) {
                $('#PayModal').fadeOut(200);
            }
        });
    });
</script>
</body>
</html>
