<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JoinPage</title>


</head>
<body>
<h1>회원가입</h1>
<!--/*@thymesVar id="joinRequest" type=""*/-->
<form th:action="@{/join}" method="post" th:object="${joinRequest}">

<!--    로그인 아이디 입력-->
    <input type="text" th:field="*{loginId}" placeholder="로그인 아이디를 입력하세요"/><br>
<!--    비밀번호 입력-->
    <input type="password" th:field="*{userPassword}" placeholder="비밀번호를 입력하세요" /><br>
<!--    비밀번호 확인 입력-->
    <input type="password" th:field="*{userPasswordConfirm}" placeholder="비밀번호를 다시 입력하세요" />
    <button type="button" onclick="checkPasswordMatch()">비밀번호 확인</button><br>
<!--    이름 입력-->
    <input type="text" th:field="*{userName}" placeholder="이름을 입력하세요"/><br>
<!--    생년월일 입력-->
    <input type="text" th:field="*{userBirth}" placeholder="생년월일"/><br>
<!--    성별 선택-->
    <input type="radio" th:field="*{userGender}" value="M"/>M
    <input type="radio" th:field="*{userGender}"  value="F" />F<br>
<!--    핸드폰 번호-->
    <input type="text" th:field="*{userPhone}" placeholder="휴대폰 번호"/><br>
<!--    이메일 입력-->
    <input type="email" th:field="*{userEmail}" placeholder="이메일">
<!--    가입 버튼-->
    <button type="submit">회원가입</button>
</form>



</body>
</html>
<script src="/js/join.js"></script>
